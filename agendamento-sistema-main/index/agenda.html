<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda | Adriano Hair Style</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .agenda-page {
      display: flex;
      flex-direction: column;
      gap: 0;
      padding: 0;
      background:
        radial-gradient(circle at top right, rgba(36, 87, 255, 0.1), transparent 28%),
        var(--black);
    }

    .agenda-topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      padding: 18px 32px;
      background: rgba(2, 3, 5, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .agenda-topbar-left {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .agenda-topbar-title {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .agenda-topbar-title .eyebrow {
      margin-bottom: 0;
    }

    .agenda-topbar-title h1 {
      font-size: 2.8rem;
      line-height: 1;
    }

    .agenda-week-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      padding: 5px 6px;
    }

    .week-nav-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.82rem;
      transition: var(--transition);
    }

    .week-nav-btn:hover {
      background: rgba(255,255,255,0.1);
      color: white;
    }

    #weekLabel {
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-weight: 700;
      color: rgba(255,255,255,0.75);
      padding: 0 10px;
      white-space: nowrap;
      min-width: 210px;
      text-align: center;
    }

    .agenda-topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .barber-filter-wrap {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .barber-pill {
      padding: 8px 15px;
      border-radius: 999px;
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.55);
      transition: var(--transition);
      white-space: nowrap;
    }

    .barber-pill:hover {
      color: white;
      border-color: rgba(255,255,255,0.2);
    }

    .barber-pill.active {
      background: linear-gradient(135deg, var(--blue-light), var(--blue));
      border-color: transparent;
      color: white;
      box-shadow: 0 6px 18px rgba(36,87,255,0.3);
    }

    .agenda-body {
      flex: 1;
      overflow-x: auto;
      padding: 24px 24px 40px;
    }

    .agenda-body::-webkit-scrollbar { height: 7px; }
    .agenda-body::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
    .agenda-body::-webkit-scrollbar-thumb { background: rgba(95,131,255,0.25); border-radius: 999px; }

    .agenda-table {
      width: 100%;
      min-width: 900px;
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.018);
    }

    .agenda-header-row {
      display: grid;
      grid-template-columns: 64px repeat(7, 1fr);
      background: linear-gradient(135deg, rgba(36,87,255,0.18), rgba(7,11,20,0.98));
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .agenda-header-cell {
      padding: 14px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      border-right: 1px solid rgba(255,255,255,0.06);
    }

    .agenda-header-cell:first-child { align-items: flex-start; padding-left: 14px; }
    .agenda-header-cell:last-child  { border-right: none; }

    .day-name {
      font-family: var(--font-display);
      font-size: 0.95rem;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.45);
    }

    .day-num {
      font-family: var(--font-display);
      font-size: 1.65rem;
      line-height: 1;
      color: white;
    }

    .day-num.today {
      color: var(--blue-light);
      text-shadow: 0 0 20px rgba(95,131,255,0.6);
    }

    .day-count {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--blue-light);
      opacity: 0.75;
    }

    .day-off {
      opacity: 0.38;
    }

    .day-off .day-name,
    .day-off .day-num {
      color: rgba(255,255,255,0.3);
    }

    .time-header-cell {
      padding: 14px 10px;
      display: flex;
      align-items: center;
    }

    .time-header-label {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }

    .agenda-time-row {
      display: grid;
      grid-template-columns: 64px repeat(7, 1fr);
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.15s;
    }

    .agenda-time-row:last-child { border-bottom: none; }
    .agenda-time-row:hover { background: rgba(255,255,255,0.01); }

    .agenda-time-cell {
      padding: 8px 10px 8px 6px;
      display: flex;
      align-items: flex-start;
      justify-content: flex-end;
      border-right: 1px solid rgba(255,255,255,0.05);
      padding-top: 10px;
    }

    .time-label {
      font-family: var(--font-display);
      font-size: 1rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.03em;
      line-height: 1;
      white-space: nowrap;
    }

    .agenda-slot-cell {
      min-height: 68px;
      padding: 5px;
      border-right: 1px solid rgba(255,255,255,0.04);
      position: relative;
      cursor: pointer;
      transition: background 0.15s;
    }

    .agenda-slot-cell:last-child { border-right: none; }

    .agenda-slot-cell.day-off-col {
      background: repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 6px,
        rgba(255,255,255,0.012) 6px,
        rgba(255,255,255,0.012) 12px
      );
    }

    .agenda-slot-cell:hover { background: rgba(36,87,255,0.07); }
    .agenda-slot-cell.day-off-col:hover { background: rgba(36,87,255,0.04); }
    .agenda-slot-cell:hover .slot-add-hint { opacity: 1; }

    .slot-add-hint {
      position: absolute;
      inset: 5px;
      border-radius: 10px;
      border: 1px dashed rgba(95,131,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      color: rgba(95,131,255,0.45);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      gap: 4px;
    }

    .slot-event {
      position: relative;
      border-radius: 10px;
      padding: 7px 9px;
      font-size: 0.76rem;
      line-height: 1.35;
      border-left: 3px solid;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      overflow: hidden;
      margin-bottom: 3px;
    }

    .slot-event:hover {
      transform: translateY(-1px) scale(1.01);
      z-index: 2;
    }

    .slot-event.pending {
      background: rgba(245,158,11,0.12);
      border-left-color: var(--warn);
      box-shadow: 0 3px 12px rgba(245,158,11,0.1);
    }

    .slot-event.confirmed {
      background: rgba(34,197,94,0.12);
      border-left-color: var(--success);
      box-shadow: 0 3px 12px rgba(34,197,94,0.1);
    }

    .slot-event.manual {
      background: rgba(36,87,255,0.14);
      border-left-color: var(--blue-light);
      box-shadow: 0 3px 12px rgba(36,87,255,0.12);
    }

    .slot-event-name {
      display: block;
      color: white;
      font-weight: 700;
      font-size: 0.78rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .slot-event-meta {
      display: block;
      color: rgba(255,255,255,0.48);
      font-size: 0.68rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .slot-event-duration {
      display: inline-block;
      margin-top: 3px;
      font-size: 0.62rem;
      font-weight: 700;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.06em;
    }

    .agenda-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      flex-wrap: wrap;
      gap: 14px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    .agenda-legend {
      display: flex;
      gap: 18px;
      align-items: center;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      color: rgba(255,255,255,0.5);
      font-size: 0.8rem;
      font-weight: 600;
    }

    .legend-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend-dot.pending   { background: var(--warn); }
    .legend-dot.confirmed { background: var(--success); }
    .legend-dot.manual    { background: var(--blue-light); }

    .agenda-count-badge {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
      font-weight: 600;
    }

    .agenda-count-badge strong {
      color: white;
      font-family: var(--font-display);
      font-size: 1.1rem;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      width: 100%;
      max-width: 540px;
      background: linear-gradient(180deg, rgba(14,20,36,0.99), rgba(6,9,16,0.99));
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 26px;
      box-shadow: 0 40px 100px rgba(0,0,0,0.7);
      overflow: hidden;
      transform: translateY(22px) scale(0.97);
      transition: transform 0.26s cubic-bezier(0.34,1.56,0.64,1), opacity 0.22s ease;
      max-height: 92vh;
      display: flex;
      flex-direction: column;
    }

    .modal-overlay.open .modal {
      transform: translateY(0) scale(1);
    }

    .modal-header {
      padding: 24px 26px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
    }

    .modal-header-info .eyebrow { margin-bottom: 5px; }

    .modal-header-info h2 {
      font-size: 2.5rem;
      line-height: 0.95;
    }

    .modal-slot-meta {
      margin-top: 7px;
      font-size: 0.82rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .modal-slot-meta i { color: var(--blue-light); }

    .modal-close {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7);
      font-size: 0.88rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      flex-shrink: 0;
    }

    .modal-close:hover {
      background: rgba(255,255,255,0.12);
      color: white;
    }

    .modal-scroll {
      overflow-y: auto;
      flex: 1;
    }

    .modal-scroll::-webkit-scrollbar { width: 5px; }
    .modal-scroll::-webkit-scrollbar-track { background: transparent; }
    .modal-scroll::-webkit-scrollbar-thumb { background: rgba(95,131,255,0.2); border-radius: 999px; }

    .modal-body { padding: 22px 26px 4px; }

    .modal-existing-events {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }

    .modal-event-card {
      border-radius: 15px;
      padding: 14px 16px;
      border: 1px solid;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .modal-event-card.pending   { background: rgba(245,158,11,0.08); border-color: rgba(245,158,11,0.22); }
    .modal-event-card.confirmed { background: rgba(34,197,94,0.08);  border-color: rgba(34,197,94,0.22); }
    .modal-event-card.manual    { background: rgba(36,87,255,0.1);   border-color: rgba(95,131,255,0.22); }

    .modal-event-info strong {
      display: block;
      color: white;
      font-size: 0.9rem;
      margin-bottom: 3px;
    }

    .modal-event-info small {
      color: var(--muted);
      font-size: 0.78rem;
    }

    .modal-event-info .duration-tag {
      display: inline-block;
      margin-left: 6px;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(95,131,255,0.12);
      color: var(--blue-light);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.06em;
    }

    .modal-event-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .modal-divider {
      height: 1px;
      background: rgba(255,255,255,0.07);
      margin: 18px 0;
    }

    .modal-form-title {
      color: var(--blue-light);
      font-size: 0.71rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .modal-form { display: flex; flex-direction: column; gap: 13px; }

    .modal-form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 11px;
    }

    .modal-footer {
      padding: 16px 26px 22px;
      border-top: 1px solid rgba(255,255,255,0.07);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-shrink: 0;
    }

    .modal-in-edit-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .modal-in-edit-header span {
      color: var(--blue-light);
      font-size: 0.71rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .modal-cancel-edit {
      font-size: 0.78rem;
      color: var(--muted);
      cursor: pointer;
      background: none;
      border: none;
      text-decoration: underline;
      transition: var(--transition);
    }

    .modal-cancel-edit:hover { color: white; }

    .empty-slot-msg {
      text-align: center;
      padding: 14px 0 4px;
      color: rgba(255,255,255,0.3);
      font-size: 0.86rem;
    }

    .duration-pills {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
    }

    .duration-pill {
      padding: 9px 15px;
      border-radius: 999px;
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.55);
      transition: var(--transition);
      white-space: nowrap;
    }

    .duration-pill:hover { color: white; border-color: rgba(255,255,255,0.2); }

    .duration-pill.selected {
      background: linear-gradient(135deg, rgba(36,87,255,0.35), rgba(95,131,255,0.2));
      border-color: rgba(95,131,255,0.4);
      color: white;
      box-shadow: 0 4px 14px rgba(36,87,255,0.22);
    }

    @media (max-width: 900px) {
      .agenda-topbar { padding: 14px 16px; gap: 12px; }
      .agenda-topbar-title h1 { font-size: 2.2rem; }
      .barber-filter-wrap { display: none; }
      .agenda-body { padding: 12px 8px 32px; }
      .modal-form-row { grid-template-columns: 1fr; }
      .modal-header-info h2 { font-size: 2rem; }
    }
  </style>
</head>
<body>

<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="sidebar-brand">
      <i class="fa-solid fa-scissors"></i>
      AHS Admin
    </div>
    <nav class="sidebar-nav">
      <a href="admin.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
      <a href="agenda.html" class="active"><i class="fa-solid fa-calendar-days"></i> Agenda</a>
      <a href="admin.html#clientesArea"><i class="fa-solid fa-users"></i> Clientes</a>
      <a href="admin.html#financeiroArea"><i class="fa-solid fa-wallet"></i> Financeiro</a>
    </nav>
    <div class="sidebar-logout">
      <button id="logoutBtn" class="btn btn-ghost btn-full btn-sm">
        <i class="fa-solid fa-right-from-bracket"></i> Sair
      </button>
    </div>
  </aside>

  <main class="agenda-page">

    <div class="agenda-topbar">
      <div class="agenda-topbar-left">
        <div class="agenda-topbar-title">
          <span class="eyebrow"><i class="fa-solid fa-calendar-days"></i> Semanal</span>
          <h1>Agenda</h1>
        </div>
        <div class="agenda-week-nav">
          <button id="prevWeek" class="week-nav-btn" title="Semana anterior">
            <i class="fa-solid fa-chevron-left"></i>
          </button>
          <span id="weekLabel"></span>
          <button id="nextWeek" class="week-nav-btn" title="Próxima semana">
            <i class="fa-solid fa-chevron-right"></i>
          </button>
        </div>
        <button id="goToday" class="btn btn-sm">
          <i class="fa-solid fa-crosshairs"></i> Hoje
        </button>
      </div>
      <div class="agenda-topbar-right">
        <div class="barber-filter-wrap" id="barberFilter"></div>
      </div>
    </div>

    <div class="agenda-body">
      <div class="agenda-table" id="agendaTable"></div>
    </div>

    <div class="agenda-footer">
      <div class="agenda-legend">
        <div class="legend-item"><div class="legend-dot pending"></div> Pendente</div>
        <div class="legend-item"><div class="legend-dot confirmed"></div> Confirmado</div>
        <div class="legend-item"><div class="legend-dot manual"></div> Manual/Finalizado</div>
        <div class="legend-item" style="margin-left:8px; opacity:0.5;">
          <div style="width:18px;height:10px;background:repeating-linear-gradient(-45deg,transparent,transparent 3px,rgba(255,255,255,0.15) 3px,rgba(255,255,255,0.15) 6px);border-radius:2px;"></div>
          Fora do expediente
        </div>
      </div>
      <div class="agenda-count-badge">
        <strong id="totalCount">0</strong> agendamentos esta semana
      </div>
    </div>

  </main>
</div>

<div class="modal-overlay" id="slotModal">
  <div class="modal" id="modalBox">
    <div class="modal-header">
      <div class="modal-header-info">
        <span class="eyebrow" id="modalEyebrow">Horário</span>
        <h2 id="modalTitle"></h2>
        <div class="modal-slot-meta" id="modalMeta"></div>
      </div>
      <button class="modal-close" id="modalClose"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-scroll">
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="utils.js"></script>
<script src="storage.js"></script>
<script>
  protegerAdmin();

const WORK_DAYS = WORK_CONFIG.workDays;
const TIME_SLOTS = [];

for (
  let minutos = timeToMinutes(WORK_CONFIG.openingTime);
  minutos < timeToMinutes(WORK_CONFIG.closingTime);
  minutos += 30
) {
  TIME_SLOTS.push(minutesToTime(minutos));
}

const DURATIONS = [
  { label: "30 min", value: 30 },
  { label: "60 min", value: 60 },
  { label: "90 min", value: 90 },
  { label: "120 min", value: 120 }
];

let currentWeekStart = startOfWeek(new Date());
let activeBarber = "todos";
let modalContext = null;
let editingId = null;
let selectedDuration = 60;

  function startOfWeek(date) {
    const d    = new Date(date);
    const day  = d.getDay();
    const diff = d.getDate() - (day === 0 ? 6 : day - 1);
    return new Date(d.getFullYear(), d.getMonth(), diff, 0, 0, 0, 0);
  }

  function getWeekDays(start) {
    const days = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(start);
      d.setDate(start.getDate() + i);
      days.push(d);
    }
    return days;
  }

  function toDateStr(date) {
    const pad = v => String(v).padStart(2, "0");
    return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}`;
  }

  function todayStr() { return toDateStr(new Date()); }

  function durationLabel(mins) {
    if (!mins || mins === 60) return "60 min";
    if (mins < 60) return `${mins} min`;
    const h = Math.floor(mins / 60);
    const m = mins % 60;
    return m ? `${h}h${String(m).padStart(2,"0")}` : `${h}h`;
  }

  function buildBarberFilter() {
    const wrap = document.getElementById("barberFilter");
    wrap.innerHTML = "";

    const allPill = document.createElement("button");
    allPill.className = "barber-pill" + (activeBarber === "todos" ? " active" : "");
    allPill.textContent = "Todos";
    allPill.onclick = () => { activeBarber = "todos"; buildBarberFilter(); renderAgenda(); };
    wrap.appendChild(allPill);

    BARBERS.forEach(b => {
      const p = document.createElement("button");
      p.className = "barber-pill" + (activeBarber === b ? " active" : "");
      p.textContent = b;
      p.onclick = () => { activeBarber = b; buildBarberFilter(); renderAgenda(); };
      wrap.appendChild(p);
    });
  }

  function renderAgenda() {
    const days         = getWeekDays(currentWeekStart);
    const today        = todayStr();
    const appointments = buscarAgendamentos();
    const dayNames     = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];

    const filtered = activeBarber === "todos"
      ? appointments
      : appointments.filter(a => a.stylist === activeBarber);

    const weekAppts = filtered.filter(a =>
      a.date >= toDateStr(days[0]) && a.date <= toDateStr(days[6])
    );

    document.getElementById("totalCount").textContent = weekAppts.length;

    const endDay      = days[6];
    const startLabel  = currentWeekStart.toLocaleDateString("pt-BR", { day:"2-digit", month:"short" });
    const endLabel    = endDay.toLocaleDateString("pt-BR", { day:"2-digit", month:"short" });
    document.getElementById("weekLabel").textContent = `${startLabel} – ${endLabel}`;

    const table = document.getElementById("agendaTable");
    table.innerHTML = "";

    const headerRow = document.createElement("div");
    headerRow.className = "agenda-header-row";

    const timeHead = document.createElement("div");
    timeHead.className = "agenda-header-cell time-header-cell";
    timeHead.innerHTML = `<span class="time-header-label">HR</span>`;
    headerRow.appendChild(timeHead);

    days.forEach(day => {
      const ds      = toDateStr(day);
      const count   = filtered.filter(a => a.date === ds).length;
      const isToday = ds === today;
      const isOff   = !WORK_DAYS.includes(day.getDay());

      const cell = document.createElement("div");
      cell.className = "agenda-header-cell" + (isOff ? " day-off" : "");
      cell.innerHTML = `
        <span class="day-name">${dayNames[day.getDay()]}</span>
        <span class="day-num${isToday ? " today" : ""}">${String(day.getDate()).padStart(2,"0")}</span>
        ${count > 0 ? `<span class="day-count">${count} ag.</span>` : ""}
      `;
      headerRow.appendChild(cell);
    });

    table.appendChild(headerRow);

    TIME_SLOTS.forEach(slot => {
      const row = document.createElement("div");
      row.className = "agenda-time-row";

      const timeCell = document.createElement("div");
      timeCell.className = "agenda-time-cell";
      timeCell.innerHTML = `<span class="time-label">${slot}</span>`;
      row.appendChild(timeCell);

      days.forEach(day => {
        const ds      = toDateStr(day);
        const matches = filtered.filter(a => a.date === ds && a.time === slot);
        const isOff   = !WORK_DAYS.includes(day.getDay());

        const cell = document.createElement("div");
        cell.className = "agenda-slot-cell" + (isOff ? " day-off-col" : "");
        cell.dataset.date = ds;
        cell.dataset.time = slot;

        if (matches.length === 0) {
          cell.innerHTML = `<div class="slot-add-hint"><i class="fa-solid fa-plus"></i> Agendar</div>`;
        } else {
          matches.forEach(appt => {
            const sc = appt.status === "Finalizado" ? "manual"
                     : appt.status === "Confirmado" ? "confirmed"
                     : appt.status === "Manual"     ? "manual"
                     : "pending";
            const dur = appt.duration ? durationLabel(appt.duration) : "";
            const ev  = document.createElement("div");
            ev.className = `slot-event ${sc}`;
            ev.dataset.id = appt.id;
            ev.innerHTML = `
              <span class="slot-event-name">${appt.name}</span>
              <span class="slot-event-meta">${appt.stylist} · ${(appt.service||"").split(" - ")[0]}</span>
              ${dur ? `<span class="slot-event-duration"><i class="fa-regular fa-clock" style="margin-right:3px"></i>${dur}</span>` : ""}
            `;
            ev.addEventListener("click", e => {
              e.stopPropagation();
              openModal(ds, slot, appt.id);
            });
            cell.appendChild(ev);
          });

          if (matches.length < BARBERS.length) {
            const hint = document.createElement("div");
            hint.className = "slot-add-hint";
            hint.innerHTML = `<i class="fa-solid fa-plus"></i> Mais`;
            cell.appendChild(hint);
          }
        }

        cell.addEventListener("click", () => openModal(ds, slot, null));
        row.appendChild(cell);
      });

      table.appendChild(row);
    });
  }

  function openModal(dateStr, timeStr, focusId) {
    const dateObj   = new Date(dateStr + "T00:00:00");
    const dayNames  = ["Domingo","Segunda-feira","Terça-feira","Quarta-feira","Quinta-feira","Sexta-feira","Sábado"];
    const dayName   = dayNames[dateObj.getDay()];
    const dateLabel = dateObj.toLocaleDateString("pt-BR", { day:"2-digit", month:"long", year:"numeric" });
    const isOff     = !WORK_DAYS.includes(dateObj.getDay());

    modalContext     = { dateStr, timeStr };
    editingId        = focusId || null;
    selectedDuration = 60;

    document.getElementById("modalEyebrow").textContent = `${timeStr} — ${dayName}${isOff ? " · Fora do expediente" : ""}`;
    document.getElementById("modalTitle").textContent   = dateLabel.split(" de ").slice(0,2).join(" de ");
    document.getElementById("modalMeta").innerHTML      = `
      <i class="fa-regular fa-clock"></i> ${timeStr}
      <i class="fa-regular fa-calendar" style="margin-left:6px"></i> ${dateLabel}
    `;

    buildModalBody();

    document.getElementById("slotModal").classList.add("open");
    document.body.style.overflow = "hidden";
  }

  function buildModalBody() {
    const { dateStr, timeStr } = modalContext;
    const all     = buscarAgendamentos();
    const matches = all.filter(a => a.date === dateStr && a.time === timeStr);
    const body    = document.getElementById("modalBody");
    const footer  = document.getElementById("modalFooter");
    body.innerHTML   = "";
    footer.innerHTML = "";

    if (editingId) {
      const appt = all.find(a => a.id === editingId);
      if (appt) { renderEditForm(body, footer, appt); return; }
    }

    if (matches.length > 0) {
      const listDiv = document.createElement("div");
      listDiv.className = "modal-existing-events";

      matches.forEach(appt => {
        const sc  = appt.status === "Finalizado" ? "manual"
                  : appt.status === "Confirmado" ? "confirmed"
                  : appt.status === "Manual"     ? "manual"
                  : "pending";
        const dur = appt.duration ? durationLabel(appt.duration) : "60 min";

        const card = document.createElement("div");
        card.className = `modal-event-card ${sc}`;
        card.innerHTML = `
          <div class="modal-event-info">
            <strong>
              ${appt.name}
              <span class="duration-tag"><i class="fa-regular fa-clock"></i> ${dur}</span>
            </strong>
            <small>${appt.stylist} · ${(appt.service||"").split(" - ")[0]}${appt.phone ? ` · ${appt.phone}` : ""}</small>
          </div>
          <div class="modal-event-actions">
            ${appt.status !== "Confirmado" && appt.status !== "Finalizado"
              ? `<button class="btn-action confirm" data-id="${appt.id}" data-action="confirm" title="Confirmar"><i class="fa-solid fa-check"></i></button>`
              : ""}
            ${appt.status !== "Finalizado"
              ? `<button class="btn-action" data-id="${appt.id}" data-action="finish" style="color:var(--success);border-color:rgba(34,197,94,0.28)" title="Fechar atendimento"><i class="fa-solid fa-cash-register"></i></button>`
              : ""}
            <button class="btn-action" data-id="${appt.id}" data-action="edit" style="color:var(--blue-light);border-color:rgba(95,131,255,0.28)" title="Editar"><i class="fa-solid fa-pen"></i></button>
            ${appt.phone
              ? `<button class="btn-action whatsapp" data-phone="${appt.phone}" data-name="${appt.name}" data-action="whatsapp" title="WhatsApp"><i class="fa-brands fa-whatsapp"></i></button>`
              : ""}
            <button class="btn-action delete" data-id="${appt.id}" data-action="delete" title="Excluir"><i class="fa-solid fa-trash"></i></button>
          </div>
        `;
        listDiv.appendChild(card);
      });

      listDiv.addEventListener("click", e => {
        const btn = e.target.closest("[data-action]");
        if (!btn) return;
        const { action, id, phone, name } = btn.dataset;
        if      (action === "confirm")   confirmAppt(id);
        else if (action === "finish")    renderFinishForm(id);
        else if (action === "edit")      { editingId = id; buildModalBody(); }
        else if (action === "delete")    deleteAppt(id);
        else if (action === "whatsapp") {
          const p = phone.replace(/\D/g,"");
          window.open(`https://wa.me/55${p}?text=Ol%C3%A1%20${encodeURIComponent(name)}!%20Passando%20para%20confirmar%20seu%20hor%C3%A1rio%20na%20Adriano%20Hair%20Style.`, "_blank");
        }
      });

      body.appendChild(listDiv);
    } else {
      const msg = document.createElement("p");
      msg.className = "empty-slot-msg";
      msg.innerHTML = `<i class="fa-regular fa-calendar-xmark" style="margin-right:6px;color:var(--blue-light)"></i>Horário livre`;
      body.appendChild(msg);
    }

    const divider = document.createElement("div");
    divider.className = "modal-divider";
    body.appendChild(divider);

    const formTitle = document.createElement("div");
    formTitle.className = "modal-form-title";
    formTitle.innerHTML = `<i class="fa-solid fa-calendar-plus"></i> Novo agendamento`;
    body.appendChild(formTitle);

    renderNewForm(body, footer);
  }

  function buildDurationPills(containerId, currentVal) {
    const wrap = document.getElementById(containerId);
    if (!wrap) return;
    wrap.innerHTML = "";
    DURATIONS.forEach(d => {
      const p = document.createElement("button");
      p.type = "button";
      p.className = "duration-pill" + (d.value === currentVal ? " selected" : "");
      p.textContent = d.label;
      p.dataset.val = d.value;
      p.onclick = () => {
        selectedDuration = d.value;
        buildDurationPills(containerId, d.value);
      };
      wrap.appendChild(p);
    });
  }

  function renderNewForm(body, footer) {
    const { dateStr, timeStr } = modalContext;

    const form = document.createElement("div");
    form.className = "modal-form";
    form.innerHTML = `
      <div class="modal-form-row">
        <div class="form-group">
          <label>Nome do cliente</label>
          <input type="text" id="mName" placeholder="Ex: João Silva">
        </div>
        <div class="form-group">
          <label>Telefone</label>
          <input type="tel" id="mPhone" placeholder="Ex: 11987654321">
        </div>
      </div>
      <div class="modal-form-row">
        <div class="form-group">
          <label>Barbeiro</label>
          <select id="mBarber">
            ${BARBERS.map(b => `<option value="${b}">${b}</option>`).join("")}
          </select>
        </div>
        <div class="form-group">
          <label>Serviço</label>
          <select id="mService">
            ${SERVICES.map(s => `<option value="${s.value}">${s.label} — R$ ${s.price}</option>`).join("")}
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Duração <span style="opacity:0.55;font-weight:500;text-transform:none;font-size:0.72rem;">(padrão 60 min)</span></label>
        <div class="duration-pills" id="newDurationPills"></div>
      </div>
    `;
    body.appendChild(form);

    buildDurationPills("newDurationPills", selectedDuration);

    footer.innerHTML = `
      <button class="btn btn-ghost btn-sm" id="modalCancelBtn">Cancelar</button>
      <button class="btn btn-sm" id="modalSaveNewBtn">
        <i class="fa-solid fa-calendar-plus"></i> Agendar
      </button>
    `;

    document.getElementById("modalCancelBtn").onclick = closeModal;
    document.getElementById("modalSaveNewBtn").onclick = () => {
      const name    = document.getElementById("mName").value.trim();
      const phone   = document.getElementById("mPhone").value.trim();
      const stylist = document.getElementById("mBarber").value;
      const service = document.getElementById("mService").value;

      if (!name) { showNotification("Informe o nome do cliente.", "error"); return; }

      const svcObj = SERVICES.find(s => s.value === service);
      const result = adicionarAgendamento({
        name, phone, service, stylist,
        date: dateStr, time: timeStr,
        status: "Manual",
        origem: "Manual",
        duration: selectedDuration,
        price: svcObj ? svcObj.price : 0
      });

      if (result.sucesso) {
        showNotification(result.mensagem, "success");
        closeModal();
        renderAgenda();
      } else {
        showNotification(result.mensagem, "error");
      }
    };
  }

  function renderEditForm(body, footer, appt) {
    let editDuration = appt.duration || 60;

    const header = document.createElement("div");
    header.className = "modal-in-edit-header";
    header.innerHTML = `
      <span><i class="fa-solid fa-pen" style="margin-right:5px"></i>Editando: ${appt.name}</span>
      <button class="modal-cancel-edit" id="cancelEditBtn">← Voltar</button>
    `;
    body.appendChild(header);

    const form = document.createElement("div");
    form.className = "modal-form";
    form.innerHTML = `
      <div class="modal-form-row">
        <div class="form-group">
          <label>Nome</label>
          <input type="text" id="eName" value="${appt.name}">
        </div>
        <div class="form-group">
          <label>Telefone</label>
          <input type="tel" id="ePhone" value="${appt.phone || ""}">
        </div>
      </div>
      <div class="modal-form-row">
        <div class="form-group">
          <label>Barbeiro</label>
          <select id="eBarber">
            ${BARBERS.map(b => `<option value="${b}" ${b === appt.stylist ? "selected" : ""}>${b}</option>`).join("")}
          </select>
        </div>
        <div class="form-group">
          <label>Serviço</label>
          <select id="eService">
            ${SERVICES.map(s => `<option value="${s.value}" ${s.value === appt.service ? "selected" : ""}>${s.label} — R$ ${s.price}</option>`).join("")}
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Duração</label>
        <div class="duration-pills" id="editDurationPills"></div>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="eStatus">
          <option value="Pendente"   ${appt.status === "Pendente"   ? "selected" : ""}>Pendente</option>
          <option value="Confirmado" ${appt.status === "Confirmado" ? "selected" : ""}>Confirmado</option>
          <option value="Manual"     ${appt.status === "Manual"     ? "selected" : ""}>Manual</option>
          <option value="Finalizado" ${appt.status === "Finalizado" ? "selected" : ""}>Finalizado</option>
        </select>
      </div>
    `;
    body.appendChild(form);

    selectedDuration = editDuration;
    buildDurationPills("editDurationPills", editDuration);

    footer.innerHTML = `
      <button class="btn btn-ghost btn-sm" id="editCancelBtn">Cancelar</button>
      <button class="btn-action delete" id="editDeleteBtn" style="padding:0 16px;min-height:38px;border-radius:999px;">
        <i class="fa-solid fa-trash"></i> Excluir
      </button>
      <button class="btn btn-sm" id="editSaveBtn">
        <i class="fa-solid fa-check"></i> Salvar
      </button>
    `;

    document.getElementById("cancelEditBtn").onclick  = () => { editingId = null; buildModalBody(); };
    document.getElementById("editCancelBtn").onclick  = closeModal;
    document.getElementById("editDeleteBtn").onclick  = () => deleteAppt(appt.id);
    document.getElementById("editSaveBtn").onclick    = () => {
      const name    = document.getElementById("eName").value.trim();
      const phone   = document.getElementById("ePhone").value.trim();
      const stylist = document.getElementById("eBarber").value;
      const service = document.getElementById("eService").value;
      const status  = document.getElementById("eStatus").value;
      const dur     = selectedDuration;

      if (!name) { showNotification("Informe o nome.", "error"); return; }

      const all  = buscarAgendamentos();
      const idx  = all.findIndex(a => a.id === appt.id);
      const svc  = SERVICES.find(s => s.value === service);
      if (idx !== -1) {
        all[idx] = { ...all[idx], name: sanitizeString(name), phone: sanitizeString(phone), stylist, service, status, duration: dur, price: svc ? svc.price : all[idx].price };
        salvarAgendamentos(all);
        showNotification("Agendamento atualizado.", "success");
        closeModal();
        renderAgenda();
      }
    };
  }


  function renderFinishForm(id) {
    const all = buscarAgendamentos();
    const appt = all.find(a => a.id === id);

    if (!appt) {
      showNotification("Agendamento não encontrado.", "error");
      return;
    }

    const body = document.getElementById("modalBody");
    const footer = document.getElementById("modalFooter");
    const serviceName = (appt.service || "").split(" - ")[0];
    const price = Number(appt.price || extractPrice(appt.service));

    body.innerHTML = `
      <div class="modal-in-edit-header">
        <span><i class="fa-solid fa-cash-register" style="margin-right:5px"></i>Fechar atendimento</span>
        <button class="modal-cancel-edit" id="cancelFinishBtn">← Voltar</button>
      </div>

      <div class="modal-event-card confirmed">
        <div class="modal-event-info">
          <strong>${appt.name}</strong>
          <small>${appt.stylist} · ${serviceName} · ${formatMoney(price)}</small>
        </div>
      </div>

      <div class="modal-divider"></div>

      <div class="modal-form">
        <div class="form-group">
          <label>Forma de pagamento</label>
          <select id="finishPayment">
            <option value="">Selecione</option>
            <option value="Pix">Pix</option>
            <option value="Dinheiro">Dinheiro</option>
            <option value="Débito">Débito</option>
            <option value="Crédito">Crédito</option>
          </select>
        </div>

        <p class="empty-slot-msg" style="text-align:left;">
          Pix e dinheiro entram sem taxa. Débito calcula 2% e crédito calcula 4%.
        </p>
      </div>
    `;

    footer.innerHTML = `
      <button class="btn btn-ghost btn-sm" id="finishCancelBtn">Cancelar</button>
      <button class="btn btn-sm" id="finishSaveBtn">
        <i class="fa-solid fa-check"></i> Finalizar atendimento
      </button>
    `;

    document.getElementById("cancelFinishBtn").onclick = buildModalBody;
    document.getElementById("finishCancelBtn").onclick = closeModal;

    document.getElementById("finishSaveBtn").onclick = () => {
      const metodo = document.getElementById("finishPayment").value;
      const result = fecharAtendimento(id, metodo);

      if (result.sucesso) {
        showNotification(result.mensagem, "success");
        closeModal();
        renderAgenda();
      } else {
        showNotification(result.mensagem, "error");
      }
    };
  }

  function confirmAppt(id) {
    const all = buscarAgendamentos();
    const idx = all.findIndex(a => a.id === id);
    if (idx !== -1) {
      all[idx].status = "Confirmado";
      salvarAgendamentos(all);
      showNotification("Confirmado!", "success");
      buildModalBody();
      renderAgenda();
    }
  }

  function deleteAppt(id) {
    if (!confirm("Excluir este agendamento?")) return;
    removerAgendamento(id);
    showNotification("Agendamento removido.", "info");
    closeModal();
    renderAgenda();
  }

  function closeModal() {
    document.getElementById("slotModal").classList.remove("open");
    document.body.style.overflow = "";
    modalContext     = null;
    editingId        = null;
    selectedDuration = 60;
  }

  document.getElementById("modalClose").onclick = closeModal;
  document.getElementById("slotModal").addEventListener("click", e => {
    if (e.target === document.getElementById("slotModal")) closeModal();
  });
  document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

  document.getElementById("prevWeek").addEventListener("click", () => {
    currentWeekStart.setDate(currentWeekStart.getDate() - 7);
    renderAgenda();
  });

  document.getElementById("nextWeek").addEventListener("click", () => {
    currentWeekStart.setDate(currentWeekStart.getDate() + 7);
    renderAgenda();
  });

  document.getElementById("goToday").addEventListener("click", () => {
    currentWeekStart = startOfWeek(new Date());
    renderAgenda();
  });

  document.getElementById("logoutBtn").addEventListener("click", () => {
    logoutAdmin();
    window.location.href = "login.html";
  });

  buildBarberFilter();
  renderAgenda();
</script>
</body>
</html>
