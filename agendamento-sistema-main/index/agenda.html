<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda | Adriano Hair Style</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header class="site-header">
    <a href="admin.html" class="brand-block">
      <div class="brand-icon-box">
        <i class="fa-solid fa-calendar-days"></i>
      </div>
      <div class="brand-text-block">
        <span class="brand-name-text">Agenda <strong>Interna</strong></span>
        <span class="brand-sub-text">Controle de horários</span>
      </div>
    </a>

    <nav class="header-nav">
      <a href="admin.html" class="btn btn-ghost">Voltar</a>
      <a href="index.html" class="btn btn-primary">Site</a>
    </nav>
  </header>

  <main class="agenda-page">
    <section class="agenda-hero">
      <div>
        <span class="eyebrow">Controle Diário</span>
        <h1>Agenda operacional</h1>
        <p>Visualize horários reservados e clique em horários livres para marcar manualmente.</p>
      </div>

      
    </section>

    <section class="agenda-toolbar">
      <div class="form-group">
        <label for="agendaDate">Data</label>
        <input id="agendaDate" type="date">
      </div>

      <div class="agenda-actions">
        <button id="todayBtn" class="btn btn-ghost">Hoje</button>
        <button id="prevBtn" class="btn btn-ghost">← Dia anterior</button>
        <button id="nextBtn" class="btn btn-ghost">Próximo dia →</button>
      </div>

      <div class="agenda-legend">
        <span><i class="legend-free"></i> Livre</span>
        <span><i class="legend-booked"></i> Ocupado</span>
      </div>
    </section>

    <section class="agenda-shell">
      <div id="scheduleGrid" class="schedule-grid premium-schedule"></div>
    </section>
  </main>

  <div id="manualModal" class="modal">
    <div class="modal-content premium-modal">
      <button id="closeManualModal" class="close-modal" type="button">×</button>
      <h2>Novo agendamento manual</h2>
      <p class="muted-text" id="manualInfo"></p>

      <form id="manualForm">
        <div class="form-group">
          <label for="manualName">Nome do cliente</label>
          <input id="manualName" type="text" required>
        </div>

        <div class="form-group">
          <label for="manualPhone">WhatsApp</label>
          <input id="manualPhone" type="tel" placeholder="Ex: 11999999999" required>
        </div>

        <div class="form-group">
          <label for="manualService">Serviço</label>
          <select id="manualService" required>
            <option value="Corte Masculino - R$ 50">Corte Masculino - R$ 50</option>
            <option value="Corte + Sobrancelha - R$ 55">Corte + Sobrancelha - R$ 55</option>
            <option value="Combo corte e barba - R$ 90">Combo corte e barba - R$ 90</option>
            <option value="Acabamento - R$ 20">Acabamento - R$ 20</option>
            <option value="Progressiva - R$ 90">Progressiva - R$ 90</option>
            <option value="Platinado - R$ 110">Platinado - R$ 110</option>
          </select>
        </div>

        <button type="submit">Salvar agendamento manual</button>
      </form>
    </div>
  </div>

  <div id="detailsModal" class="modal">
    <div class="modal-content premium-modal">
      <button id="closeDetailsModal" class="close-modal" type="button">×</button>
      <h2>Detalhes do horário</h2>
      <div id="detailsContent"></div>

      <div class="modal-actions">
        <button id="confirmBtn" type="button">Confirmar horário</button>
        <button id="whatsBtn" type="button">Chamar no WhatsApp</button>
        <button id="deleteBtn" type="button" class="danger-btn">Excluir reserva</button>
      </div>
    </div>
  </div>

  <script src="storage.js"></script>

  <script>
    protegerAdmin();

    const stylists = ["Adriano", "Arthur", "Igor", "Vinícius"];
    const times = ["09:00", "10:00", "11:00", "12:00", "13:00", "14:00", "15:00", "16:00", "17:00", "18:00", "19:00","20:00"];

    const agendaDate = document.getElementById("agendaDate");
    const scheduleGrid = document.getElementById("scheduleGrid");

    const manualModal = document.getElementById("manualModal");
    const manualForm = document.getElementById("manualForm");
    const manualInfo = document.getElementById("manualInfo");

    const detailsModal = document.getElementById("detailsModal");
    const detailsContent = document.getElementById("detailsContent");

    let selectedSlot = null;
    let selectedBooking = null;

    const today = new Date().toISOString().split("T")[0];
    agendaDate.value = today;

    function formatDate(dateString) {
      const [year, month, day] = dateString.split("-");
      return `${day}/${month}/${year}`;
    }

    function renderAgenda() {
      const bookings = buscarAgendamentos();
      const date = agendaDate.value;

      scheduleGrid.innerHTML = "";

      const header = document.createElement("div");
      header.className = "schedule-row header";
      header.innerHTML = `<div>Hora</div>${stylists.map(name => `<div>${name}</div>`).join("")}`;
      scheduleGrid.appendChild(header);

      times.forEach(time => {
        const row = document.createElement("div");
        row.className = "schedule-row";

        row.innerHTML = `<div class="time-cell">${time}</div>`;

        stylists.forEach(stylist => {
          const booking = bookings.find(item => item.date === date && item.time === time && item.stylist === stylist);

          const cell = document.createElement("div");
          cell.className = booking ? "slot-cell booked premium-slot" : "slot-cell free premium-slot";

          if (booking) {
            cell.innerHTML = `
              <strong>${booking.name}</strong>
              <span>${booking.service}</span>
            `;

            cell.addEventListener("click", () => openDetails(booking));
          } else {
            cell.innerHTML = `
            <strong>Disponível</strong>
          `;

            cell.addEventListener("click", () => openManual({ date, time, stylist }));
          }

          row.appendChild(cell);
        });

        scheduleGrid.appendChild(row);
      });
    }

    function openManual(slot) {
      selectedSlot = slot;
      manualInfo.textContent = `${slot.stylist} • ${formatDate(slot.date)} • ${slot.time}`;
      manualForm.reset();
      manualModal.classList.add("open");
    }

    function closeManual() {
      manualModal.classList.remove("open");
      selectedSlot = null;
    }

    manualForm.addEventListener("submit", event => {
      event.preventDefault();

      if (!selectedSlot) return;

      const agendamento = {
        name: document.getElementById("manualName").value.trim(),
        phone: document.getElementById("manualPhone").value.trim(),
        service: document.getElementById("manualService").value,
        stylist: selectedSlot.stylist,
        date: selectedSlot.date,
        time: selectedSlot.time,
        status: "Manual"
      };

      const resultado = adicionarAgendamento(agendamento);

      if (!resultado.sucesso) {
        alert(resultado.mensagem);
        renderAgenda();
        closeManual();
        return;
      }

      closeManual();
      renderAgenda();
    });

    function openDetails(booking) {
      selectedBooking = booking;

      detailsContent.innerHTML = `
        <div class="details-list">
          <p><strong>Cliente:</strong> ${booking.name}</p>
          <p><strong>WhatsApp:</strong> ${booking.phone}</p>
          <p><strong>Serviço:</strong> ${booking.service}</p>
          <p><strong>Profissional:</strong> ${booking.stylist}</p>
          <p><strong>Data:</strong> ${formatDate(booking.date)}</p>
          <p><strong>Horário:</strong> ${booking.time}</p>
          <p><strong>Status:</strong> ${booking.status || "Pendente"}</p>
        </div>
      `;

      detailsModal.classList.add("open");
    }

    function closeDetails() {
      detailsModal.classList.remove("open");
      selectedBooking = null;
    }

    document.getElementById("confirmBtn").addEventListener("click", () => {
      if (!selectedBooking) return;

      const bookings = buscarAgendamentos().map(item => {
        if (item.id === selectedBooking.id) {
          return { ...item, status: "Confirmado" };
        }

        return item;
      });

      salvarAgendamentos(bookings);
      closeDetails();
      renderAgenda();
    });

    document.getElementById("whatsBtn").addEventListener("click", () => {
      if (!selectedBooking) return;

      const phone = selectedBooking.phone.replace(/\D/g, "");
      const text = `Olá, ${selectedBooking.name}! Estamos entrando em contato sobre seu horário na Adriano Hair Style: ${selectedBooking.date} às ${selectedBooking.time}.`;
      window.open(`https://wa.me/55${phone}?text=${encodeURIComponent(text)}`, "_blank");
    });

    document.getElementById("deleteBtn").addEventListener("click", () => {
      if (!selectedBooking) return;

      if (confirm("Deseja excluir este agendamento?")) {
        removerAgendamento(selectedBooking.id);
        closeDetails();
        renderAgenda();
      }
    });

    document.getElementById("closeManualModal").addEventListener("click", closeManual);
    document.getElementById("closeDetailsModal").addEventListener("click", closeDetails);

    document.getElementById("todayBtn").addEventListener("click", () => {
      agendaDate.value = today;
      renderAgenda();
    });

    document.getElementById("prevBtn").addEventListener("click", () => {
      const date = new Date(agendaDate.value);
      date.setDate(date.getDate() - 1);
      agendaDate.value = date.toISOString().split("T")[0];
      renderAgenda();
    });

    document.getElementById("nextBtn").addEventListener("click", () => {
      const date = new Date(agendaDate.value);
      date.setDate(date.getDate() + 1);
      agendaDate.value = date.toISOString().split("T")[0];
      renderAgenda();
    });

    agendaDate.addEventListener("change", renderAgenda);

    renderAgenda();
  </script>
</body>
</html>
