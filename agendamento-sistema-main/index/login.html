<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Adriano Hair Style</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-page">
  <div class="login-wrap">
    <div class="login-left">
      <div class="login-brand">
        <i class="fa-solid fa-scissors"></i>
        AHS Admin
      </div>
      <h2>Painel de gestão</h2>
      <p>Acesse o painel interno para gerenciar agendamentos, financeiro e equipe da barbearia.</p>
    </div>

    <div class="login-right">
      <span class="eyebrow">Acesso restrito</span>
      <h2>Entrar</h2>
      <p>Use suas credenciais de administrador.</p>

      <form id="formLogin" class="login-form">
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="admin@admin.com" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" placeholder="••••••" required autocomplete="current-password">
        </div>
        <div id="loginMsg"></div>
        <button type="submit" class="btn btn-full">
          <i class="fa-solid fa-right-to-bracket"></i>
          Entrar no painel
        </button>
      </form>

      <p class="login-hint">Problemas de acesso? Contate o administrador.</p>
    </div>
  </div>
</div>

<script src="utils.js"></script>
<script src="storage.js"></script>
<script>
  if (adminLogado()) {
    window.location.href = "admin.html";
  }

  document.getElementById("formLogin").addEventListener("submit", function(e) {
    e.preventDefault();
    const email = document.getElementById("email").value.trim();
    const senha = document.getElementById("senha").value;
    const msg = document.getElementById("loginMsg");

    if (loginAdmin(email, senha)) {
      msg.innerHTML = `<div class="info-msg success"><i class="fa-solid fa-check-circle"></i> Login realizado! Redirecionando...</div>`;
      setTimeout(() => window.location.href = "admin.html", 1000);
    } else {
      msg.innerHTML = `<div class="info-msg error"><i class="fa-solid fa-times-circle"></i> E-mail ou senha incorretos.</div>`;
    }
  });
</script>
</body>
</html>
