<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Adriano Hair Style</title>
  <link rel="stylesheet" href="style.css">
  
</head>
<body>

<div class="admin-layout">
  <aside class="admin-sidebar" style="background: rgba(0,0,0,0.3); padding: 2rem; border-right: 1px solid var(--glass-border);">
    <h2 style="color: var(--accent-blue); margin-bottom: 2rem;">AHS Admin</h2>
    <nav style="display: flex; flex-direction: column; gap: 15px;">
      <a href="agenda.html" class="active" style="margin:0">📅 Agenda</a>
      <a href="#" style="margin:0">👥 Clientes</a>
      <a href="#" style="margin:0">💰 Financeiro</a>
      <a href="index.html" style="margin:0; margin-top: 50px; color: #ff4444;">Sair</a>
    </nav>
  </aside>

  <main class="admin-main" style="padding: 2rem;">
    <header class="animate" style="background: transparent; border: none; padding: 0; margin-bottom: 2rem;">
      <h1>Dashboard Administrativo</h1>
    </header>

    <div class="dashboard animate">
      <div class="card">
        <small style="color: var(--text-dim)">Faturamento Semanal</small>
        <h2 id="faturamento">R$ 0,00</h2>
      </div>
      <div class="card">
        <small style="color: var(--text-dim)">Agendamentos Semanais</small>
        <h2 id="totalAgendamentos">0</h2>
      </div>
      <div class="card">
        <small style="color: var(--text-dim)">Participação Adriano</small>
        <h2 id="receitaTotal">R$ 0,00</h2>
      </div>
    </div>

    <div class="card animate" style="margin-top: 1rem;">
      <h3>Faturamento por barbeiro (semana atual)</h3>
      <div style="display:flex; gap:0.5rem; margin-bottom:0.5rem;">
        <button id="prevWeekAdmin" class="btn-admin" style="padding:4px 8px; font-size:0.8rem;">←</button>
        <span id="currentWeekAdmin" style="align-self:center; color: var(--text-dim); font-size:0.9rem;"></span>
        <button id="nextWeekAdmin" class="btn-admin" style="padding:4px 8px; font-size:0.8rem;">→</button>
        <button id="goTodayAdmin" class="btn-primary" style="padding:4px 8px; font-size:0.8rem;">Hoje</button>
      </div>
      <ul id="barberRevenue" style="list-style:none; padding-left:0; margin: 0.5rem 0 0 0;"></ul>
    </div>

    <div class="grid-container animate" style="display: grid; grid-template-columns: 2fr 1fr; gap: 20px;">
      <div class="grid-panel">
        <h3>Próximos Horários</h3>
        <ul id="lista" style="list-style: none; margin-top: 1rem;"></ul>
      </div>
      
      <div class="grid-panel">
        <h3>Lançar Entrada</h3>
        <form id="formCaixa">
          <input type="text" placeholder="Nome do Cliente">
          <select>
            <option>Corte Masculino - R$50</option>
            <option>Corte/Sobrancelha - R$55</option>
            <option>Combo corte e barba - R$90</option>
            <option>Acabamento - R$20</option>
            <option>Progressiva - R$90</option>
            <option>Platinado - R$110</option>
          </select>
          <button type="submit">Confirmar Pagamento</button>
        </form>
      </div>
    </div>
  </main>
</div>

<script>
  const scheduleData = JSON.parse(localStorage.getItem('ahasSchedule') || '[]');

  const servicePrices = {
    'Corte Masculino': 50,
    'Corte com Sobrancelha': 55,
    'Combo Corte e Barba': 90,
    'Acabamento': 20,
    'Progressiva': 90,
    'Platinado': 110
  };

  const barberShare = {
    'Adriano': 1.0,
    'Arthur': 0.5666666667,
    'Igor': 0.5,
    'Vinícius': 0.5
  };

  let currentWeekStart = startOfWeek(new Date());

  function startOfWeek(date) {
    const day = date.getDay();
    const diff = date.getDate() - (day === 0 ? 6 : day - 1);
    return new Date(date.getFullYear(), date.getMonth(), diff, 0, 0, 0, 0);
  }

  function endOfWeek(start) {
    const end = new Date(start);
    end.setDate(end.getDate() + 6);
    end.setHours(23,59,59,999);
    return end;
  }

  function formatWeek(start) {
    const end = endOfWeek(start);
    return `${start.toLocaleDateString('pt-BR')} - ${end.toLocaleDateString('pt-BR')}`;
  }

  function formatMoney(value) {
    return value.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  }

  function calculateWeeklyRevenue(weekStart) {
    const weekEnd = endOfWeek(weekStart);

    const allWeekly = scheduleData.filter(item => {
      if (!item.date) return false;
      const d = new Date(item.date);
      return d >= weekStart && d <= weekEnd;
    });

    const stats = {
      totalValue: 0,
      totalAppointments: allWeekly.length,
      ownerValue: 0,
      breakdown: {
        Adriano: 0,
        Arthur: 0,
        Igor: 0,
        Vinícius: 0
      }
    };

    allWeekly.forEach(appointment => {
      const price = servicePrices[appointment.service] || 0;
      stats.totalValue += price;

      if (appointment.stylist && barberShare[appointment.stylist] !== undefined) {
        const share = price * barberShare[appointment.stylist];
        stats.breakdown[appointment.stylist] += share;

        if (appointment.stylist === 'Adriano') {
          stats.ownerValue += price;
        }
      }
    });

    return stats;
  }

  function renderRevenue() {
    const stats = calculateWeeklyRevenue(currentWeekStart);

    document.getElementById('faturamento').textContent = formatMoney(stats.totalValue);
    document.getElementById('totalAgendamentos').textContent = stats.totalAppointments;
    document.getElementById('receitaTotal').textContent = formatMoney(stats.ownerValue);

    const list = document.getElementById('barberRevenue');
    list.innerHTML = '';

    Object.keys(stats.breakdown).forEach(barber => {
      const li = document.createElement('li');
      const shareValue = stats.breakdown[barber];
      const pct = (barberShare[barber] * 100).toFixed(2).replace('.', ',');
      li.innerHTML = `<strong>${barber}</strong>: ${formatMoney(shareValue)} <span style="color: var(--text-dim); font-size:0.8rem;">(${pct}% do serviço)</span>`;
      list.appendChild(li);
    });

    document.getElementById('currentWeekAdmin').textContent = formatWeek(currentWeekStart);
  }

  document.getElementById('prevWeekAdmin').addEventListener('click', () => {
    currentWeekStart.setDate(currentWeekStart.getDate() - 7);
    renderRevenue();
  });

  document.getElementById('nextWeekAdmin').addEventListener('click', () => {
    currentWeekStart.setDate(currentWeekStart.getDate() + 7);
    renderRevenue();
  });

  document.getElementById('goTodayAdmin').addEventListener('click', () => {
    currentWeekStart = startOfWeek(new Date());
    renderRevenue();
  });

  renderRevenue();
</script>

</body>
</html>
