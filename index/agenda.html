<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda | Adriano Hair Style</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header style="padding: 1rem 5%; display:flex; justify-content:space-between; align-items:center; background:rgba(10,14,23,0.9); border-bottom:1px solid var(--glass-border); position:sticky; top:0; z-index:1000;">
  <div>
    <p style="color:#8ec5ff; font-size:0.8rem; letter-spacing:1px; text-transform:uppercase; margin:0 0 0.35rem 0;">Painel interno</p>
    <h1 style="margin:0; font-size:1.5rem;">Agenda de horários</h1>
    <p style="color: var(--text-dim); margin:0.3rem 0 0 0;">Visual por profissional com controle diário</p>
  </div>
  <div style="display:flex; align-items:center; gap:0.5rem; flex-wrap:wrap;">
    <a href="admin.html" class="btn-admin" style="padding:10px 14px;">← Voltar</a>
    <button id="btnNovoHorario" class="btn-primary" style="padding:10px 14px;">+ Novo horário</button>
  </div>
</header>

<main style="padding: 1.5rem 5%;">
  <ul id="lista"></ul>

  <section class="card animate" style="margin-bottom: 1rem;">
    <div style="display:flex; justify-content:space-between; align-items:center; gap:1rem; flex-wrap:wrap;">
      <div>
        <small style="display:block; color:#8ec5ff; margin-bottom:0.45rem; letter-spacing:0.8px;">CONTROLE DIÁRIO</small>
        <h2 style="margin:0; font-size:1.5rem;">Agenda operacional</h2>
        <p style="color:var(--text-dim); margin-top:0.35rem;">Navegue pelos dias e clique em um horário disponível para agendar.</p>
      </div>
    </div>
  </section>

  <aside class="agenda-controls" style="margin-bottom: 1rem;">
    <button id="goToday" class="btn-primary">Hoje</button>
    <button id="prevDay" class="btn-admin">← Dia anterior</button>
    <button id="nextDay" class="btn-admin">Próximo dia →</button>
    <span class="agenda-week-label">Data: <strong id="currentDateLabel"></strong></span>
  </aside>

  <section class="card animate" style="padding:0; overflow:hidden;">
    <section class="schedule-grid" id="scheduleGrid">
      <div class="schedule-row header">
        <div>Hora</div>
        <div>Adriano</div>
        <div>Arthur</div>
        <div>Igor</div>
        <div>Vinícius</div>
      </div>
    </section>
  </section>

</main>

<div id="appointmentModal" class="modal">
  <div class="modal-content">
    <button class="close-modal" id="closeModal"><i class="fa-solid fa-x"></i></button>
    <h2>Agendar horário</h2>
    <form id="appointmentForm">
      <input type="text" id="slotDate" readonly>
      <input type="text" id="slotTime" readonly>
      <input type="text" id="slotStylist" readonly>
      <input type="text" id="clientName" required>
      <select id="service" required>
        <option value="Corte Masculino">Corte Masculino</option>
        <option value="Corte com Sobrancelha">Corte/Sobrancelha</option>
      </select>
      <input type="tel" id="clientPhone">
      <textarea id="notes"></textarea>
      <button type="submit">Salvar</button>
    </form>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<script>
const grid = document.getElementById('scheduleGrid');
const modal = document.getElementById('appointmentModal');
const closeModal = document.getElementById('closeModal');
const appointmentForm = document.getElementById('appointmentForm');
const slotDate = document.getElementById('slotDate');
const slotTime = document.getElementById('slotTime');
const slotStylist = document.getElementById('slotStylist');
const clientName = document.getElementById('clientName');
const service = document.getElementById('service');
const clientPhone = document.getElementById('clientPhone');
const notes = document.getElementById('notes');
const currentDateLabel = document.getElementById('currentDateLabel');
const btnNovoHorario = document.getElementById('btnNovoHorario');
const prevDay = document.getElementById('prevDay');
const nextDay = document.getElementById('nextDay');
const goToday = document.getElementById('goToday');

const staff = ['Adriano', 'Arthur', 'Igor', 'Vinícius'];
const hours = ['09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00'];

let currentDate = new Date();

function toYMD(date) {
  return date.toISOString().split('T')[0];
}

function renderSchedule() {
  const selectedDate = toYMD(currentDate);
  grid.innerHTML = '<div class="schedule-row header"><div>Hora</div>' + staff.map(n => `<div>${n}</div>`).join('') + '</div>';

  hours.forEach(hour => {
    const row = document.createElement('div');
    row.className = 'schedule-row';

    row.innerHTML = `<div>${hour}</div>` + staff.map(name => {
      return `<div class="slot-cell" data-time="${hour}" data-stylist="${name}">Disponível</div>`;
    }).join('');

    grid.appendChild(row);
  });
}

function openModal(time, stylist) {
  slotDate.value = toYMD(currentDate);
  slotTime.value = time;
  slotStylist.value = stylist;
  modal.classList.add('open');
}

grid.addEventListener('click', (e) => {
  const slot = e.target.closest('.slot-cell');
  if (!slot) return;
  openModal(slot.dataset.time, slot.dataset.stylist);
});

closeModal.addEventListener('click', () => modal.classList.remove('open'));

appointmentForm.addEventListener('submit', (e) => {
  e.preventDefault();

  db.collection("agendamentos").add({
    nome: clientName.value,
    data: slotDate.value,
    horario: slotTime.value,
    profissional: slotStylist.value
  }).then(() => {
    modal.classList.remove('open');
  });
});

function carregarAgenda() {
  db.collection("agendamentos")
    .onSnapshot(snapshot => {
      const lista = document.getElementById("lista");
      lista.innerHTML = "";
      snapshot.forEach(doc => {
        const ag = doc.data();
        lista.innerHTML += `<li>${ag.nome} - ${ag.data} ${ag.horario}</li>`;
      });
    });
}

renderSchedule();
carregarAgenda();
</script>

</body>
</html>
