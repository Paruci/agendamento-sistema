<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agendamento | Adriano Hair Style</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header>
  <button class="btn-back" onclick="window.history.back()">
    <i class="fa-solid fa-chevron-left"></i> Voltar
  </button>
  <h1 style="font-size: 1.2rem; font-weight: 800; letter-spacing: 1px;">ADRIANO <span style="color: var(--accent-blue);">HAIR STYLE</span></h1>
</header>

<main class="container-small animate" style="max-width: 500px; margin: 2rem auto; padding: 0 1rem;">
  <div class="form-container card">
    <div style="text-align: center; margin-bottom: 2rem;">
      <h2 style="font-size: 1.5rem;">Reserve seu Horário</h2>
      <p style="color: var(--text-dim); font-size: 0.9rem;">Escolha o serviço e a data desejada</p>
    </div>

    <form id="formAgendamento">
      <div class="input-group">
        <label><i class="fa-solid fa-user"></i> Nome Completo</label>
        <input type="text" name="nome" placeholder="Ex: João Silva" required>
      </div>

      <div class="input-group">
        <label><i class="fa-brands fa-whatsapp"></i> WhatsApp</label>
        <input type="tel" name="telefone" placeholder="(11) 99999-9999" pattern="\d{10,11}" required>
      </div>

      <div class="input-group">
        <label><i class="fa-solid fa-scissors"></i> Selecione o Serviço</label>
        <select name="servico" required>
          <option value="">Clique para escolher...</option>
          <option value="Corte Masculino">Corte Masculino - R$50</option>
          <option value="Corte + Sobrancelha">Corte + Sobrancelha - R$55</option>
          <option value="Combo corte e barba">Combo corte e barba - R$90</option>
          <option value="Acabamento">Acabamento - R$25</option>
        </select>
      </div>

      <div class="date-selector">
        <label><i class="fa-solid fa-calendar-days"></i> Data</label>
        <input type="date" name="data" required>
      </div>

      <div class="slots-wrap" style="margin-top: 1.5rem;">
        <h4 style="margin-bottom: 10px; font-size: 0.9rem; color: var(--accent-blue);">Horários Disponíveis</h4>
        <div class="slots" id="slots" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
          </div>
      </div>

      <input type="hidden" name="hora" id="horaSelecionada" required>

      <button type="submit" style="margin-top: 2rem; height: 55px; font-size: 1.1rem;">
        Finalizar Agendamento <i class="fa-solid fa-check" style="margin-left: 10px;"></i>
      </button>
    </form>
  </div>
</main>

</body>
</html>
