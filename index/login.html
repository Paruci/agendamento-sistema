<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Adriano Hair Style</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">

<main class="animate" style="width: 100%; max-width: 400px; padding: 1rem;">
  <div class="card" style="text-align: center;">
    <div style="margin-bottom: 2rem;">
        <i class="fa-solid fa-user-shield" style="font-size: 3rem; color: var(--accent-blue); margin-bottom: 1rem;"></i>
        <h2 style="text-transform: uppercase; letter-spacing: 2px;">Acesso Restrito</h2>
        <p style="color: var(--text-dim); font-size: 0.85rem;">Identifique-se para acessar o painel</p>
    </div>

    <form id="loginForm">
      <div style="text-align: left; margin-bottom: 15px;">
        <label style="font-size: 0.8rem; color: var(--text-dim);">NOME COMPLETO</label>
        <input type="text" id="loginUser" placeholder="Ex: Junin0303" required>
      </div>

      <div style="text-align: left; margin-bottom: 15px;">
        <label style="font-size: 0.8rem; color: var(--text-dim);">TELEFONE OU SENHA</label>
        <input type="password" id="loginPass" placeholder="Digite sua senha" required>
      </div>

      <button type="submit" style="margin-top: 10px; height: 50px;">ENTRAR NO PAINEL</button>
      
      <p id="errorMessage" style="color: var(--error); font-size: 0.8rem; margin-top: 15px; display: none;">
        Credenciais incorretas. Tente novamente.
      </p>
    </form>
    
    <a href="index.html" style="display: block; margin-top: 20px; color: var(--text-dim); text-decoration: none; font-size: 0.8rem;">
      <i class="fa-solid fa-arrow-left"></i> Voltar ao site
    </a>
  </div>
</main>

<script>
  const loginForm = document.getElementById('loginForm');
  const errorMsg = document.getElementById('errorMessage');

  loginForm.addEventListener('submit', (e) => {
    e.preventDefault();

    const user = document.getElementById('loginUser').value;
    const pass = document.getElementById('loginPass').value;

    // VALIDAÇÃO CONFORME SOLICITADO
    if (user === "Junin0303" && pass === "100898") {
      // Salva no localStorage para simular uma sessão ativa
      localStorage.setItem('ahs_logged', 'true');
      window.location.href = "admin.html";
    } else {
      errorMsg.style.display = 'block';
      // Shake effect simples no erro
      loginForm.classList.add('animate');
      setTimeout(() => loginForm.classList.remove('animate'), 500);
    }
  });
</script>

</body>
</html>
